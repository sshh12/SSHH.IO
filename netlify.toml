[build]
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[redirects]]
  from = "/code*"
  to = "/"
  status = 200

[[redirects]]
  from = "/coffee-chat*"
  to = "/"
  status = 200

[[redirects]]
  from = "/contact*"
  to = "https://forms.gle/m7FMe8beVMH5Z33d9"
  status = 200
